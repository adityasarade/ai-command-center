[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "aicc-sdk"
version = "0.1.0"
description = "Thin helper that routes your OpenAI/Anthropic/Gemini SDK calls through an AI Command Center gateway (one line: aicc.init(project=...))."
readme = "README.md"
requires-python = ">=3.8"
license = { text = "MIT" }
keywords = ["llm", "observability", "cost-tracking", "openai", "anthropic", "gemini"]

[tool.setuptools.packages.find]
where = ["src"]
